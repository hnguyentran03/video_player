<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashJS Video Player</title>
    <link rel="stylesheet" href="src/main.css">
</head>
<body>
    <div class="container">
        <h1>DashJS Video Player</h1>
        <video id="videoPlayer" controls></video>
        <div class="controls">
            <input type="text" id="manifestUrl" placeholder="Enter DASH manifest URL" 
                   value="https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd">
            <button onclick="loadVideo()">Load Video</button>
        </div>
        <div class="abr-controls">
            <h3>ABR Rule Selection</h3>
            <div id="ruleButtons" class="rule-buttons">
            </div>
            <p id="currentRule" class="current-rule">Current: Loading...</p>
        </div>
    </div>

    <script src="https://cdn.dashjs.org/latest/modern/umd/dash.all.min.js"></script>
    <script src="src/customAbr.js"></script>
    <script src="src/lowestBitrateRule.js"></script>
    <script src="src/highestBitrateRule.js"></script>
    <script src="src/ruleButtons.js"></script>
    <script src="src/player.js"></script>
</body>
</html>
