<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashJS Video Player</title>
    <link rel="stylesheet" href="src/main.css">
</head>
<body>
    <div class="container">
        <h1>DashJS Video Player</h1>
        <video id="videoPlayer" controls></video>
        <div class="controls">
            <input type="text" id="manifestUrl" placeholder="Enter DASH manifest URL" 
                   value="https://bitmovin-a.akamaihd.net/content/sintel/sintel.mpd">
            <button onclick="loadVideo()">Load Video</button>
        </div>
        <div class="abr-controls">
            <h3>ABR Rule Selection</h3>
            <div id="ruleButtons" class="rule-buttons">
            </div>
            <p id="currentRule" class="current-rule">Current: Loading...</p>
        </div>
        <div class="abr-controls">
            <h3>Network Speed (emulated)</h3>
            <div id="speedButtons" class="speed-buttons">
            </div>
            <div class="variable-controls">
                <label>Min <input type="number" id="variableMin" value="300" min="1"> kbps</label>
                <label>Max <input type="number" id="variableMax" value="5000" min="1"> kbps</label>
                <label>Volatility
                    <select id="variableVolatility">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </label>
                <button id="variableToggle" class="speed-btn variable-toggle" onclick="toggleVariableMode()">Start Variable</button>
            </div>
            <p id="variableReadout" class="current-rule">Variable mode off.</p>
            <p class="current-rule">Throttles segment downloads so dash.js sees the capped bandwidth.</p>
        </div>
        <div class="abr-controls">
            <h3>ABR Metrics (last 60 s)</h3>
            <div class="chart-wrap">
                <canvas id="metricsChart"></canvas>
                <div id="metricsTooltip" class="chart-tooltip"></div>
            </div>
            <div id="metricsLegend" class="chart-legend"></div>
        </div>
    </div>

    <script src="https://cdn.dashjs.org/latest/modern/umd/dash.all.min.js"></script>
    <script src="src/customAbr.js"></script>
    <script src="src/lowestBitrateRule.js"></script>
    <script src="src/highestBitrateRule.js"></script>
    <script src="src/ruleButtons.js"></script>
    <script src="src/networkThrottle.js"></script>
    <script src="src/metricsChart.js"></script>
    <script src="src/player.js"></script>
</body>
</html>
